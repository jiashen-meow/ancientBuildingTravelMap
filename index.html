  });
  mlayer=new TMap.MultiMarker({map:map,styles:styles,geometries:sites.map(function(s){
    return {id:String(s.id),styleId:"s"+s.id,position:new TMap.LatLng(s.lat,s.lng)};
  })});
  mlayer.on("click",function(e){
    var s=SITES.find(function(x){return String(x.id)===e.geometry.id;});
    if(s) showPanel(s);
  });
}

function showPanel(s){
  var c=DCOL[s.dk]||DCOL["ming"];
  var hc=s.heat==="hot"?"#c0392b":s.heat==="mid"?"#e67e22":"#27ae60";
  var ht=s.heat==="hot"?"人多（五一建议早到）":s.heat==="mid"?"一般":"清净（游客很少）";
  document.getElementById("pname").textContent=(s.must?"⚡ ":"")+s.name;
  document.getElementById("pdyn").innerHTML='<span class="bx" style="background:'+c.bg+';color:'+c.tx+'">'+s.dy+'</span>';
  var bhtml='<div class="ir"><span class="il">年代</span><span class="iv">'+s.era+'</span></div>';
  if(s.batch!=="—") bhtml+='<div class="ir"><span class="il">国保</span><span class="iv">'+s.batch+'</span></div>';
  bhtml+='<div class="ir"><span class="il">行程</span><span class="iv">Day '+s.day+'</span></div>';
  bhtml+='<div class="ir"><span class="il">人流</span><span class="iv" style="color:'+hc+'">'+ht+'</span></div>';
  bhtml+='<div class="fb">'+s.feat+'</div>';
  if(s.note) bhtml+='<div class="nb">'+s.note+'</div>';
  bhtml+='<button class="navb" onclick="window.flyTo('+s.lat+','+s.lng+')">在地图定位此处</button>';
  bhtml+='<button class="navb2" onclick="window.openNav('+s.lat+','+s.lng+',\''+s.name+'\')">腾讯地图导航</button>';
  document.getElementById("pb").innerHTML=bhtml;
  map.panTo(new TMap.LatLng(s.lat,s.lng));
}

window.closePanel = function(){
  document.getElementById("pname").textContent="点击地图标记";
  document.getElementById("pdyn").innerHTML="";
  document.getElementById("pb").innerHTML='<div id="es"><div class="bi">🗺️</div><div>点击地图上的标记</div><div>查看景点详情</div></div>';
};

window.filterDay = function(day,btn){
  curDay=day;
  document.querySelectorAll(".db").forEach(function(b){b.classList.remove("on");});
  if(btn) btn.classList.add("on");
  renderMarkers();
  var c=DCTR[day]||DCTR["all"];
  map.panTo(new TMap.LatLng(c.lat,c.lng));
  map.setZoom(c.z);
  window.closePanel();
};

window.flyTo = function(lat,lng){
  map.panTo(new TMap.LatLng(lat,lng));
  map.setZoom(15);
};

window.openNav = function(lat,lng,name){
  window.open("https://apis.map.qq.com/uri/v1/routeplan?type=drive&to="+encodeURIComponent(name)+"&tocoord="+lat+","+lng+"&policy=0&referer=TNMBZ-EXYLA-7HFKF-CDEEG-RT4B6-LWFDR","_blank");
};

window.searchPOI = function(){
  var kw=document.getElementById("pi").value.trim();
  if(!kw) return;
  if(siw){siw.close();siw=null;}
  var search=new TMap.service.Search({pageSize:5});
  search.searchRectangle({
    keyword:kw,
    bounds:new TMap.LatLngBounds(new TMap.LatLng(34.0,111.0),new TMap.LatLng(38.0,116.0))
  }).then(function(res){
    if(res.data&&res.data.length>0){
      var p=res.data[0];
      var pos=new TMap.LatLng(p.location.lat,p.location.lng);
      map.panTo(pos);map.setZoom(16);
      siw=new TMap.InfoWindow({map:map,position:pos,offset:{x:0,y:-40},
        content:'<div style="background:#fff;padding:10px 13px;border-radius:8px;border:1px solid #e0dbd5;font-size:13px;color:#1a1612;max-width:220px;box-shadow:0 3px 10px rgba(0,0,0,.1)"><b>'+p.title+'</b><br><span style="color:#8a8480;font-size:12px">'+(p.address||"")+'</span>'+(p.tel?'<br><span style="color:#2980b9;font-size:12px">'+p.tel+'</span>':"")+'</div>',
        enableCustom:true});
      siw.open();
    } else {
      alert("未找到["+kw+"]，请尝试更具体的名称");
    }
  }).catch(function(){alert("搜索失败，请检查网络");});
};
</script>
<script src="https://map.qq.com/api/gljs?v=1.exp&key=TNMBZ-EXYLA-7HFKF-CDEEG-RT4B6-LWFDR&libraries=service&callback=initMap"></script>
</body>
